<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="sun-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ff8830" stop-opacity="1"/>
      <stop offset="55%" stop-color="#ff6010" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#0d1030"/>
      <stop offset="100%" stop-color="#03040e"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- Orbital rings -->
  <ellipse cx="16" cy="16" rx="8"    ry="5.5"  fill="none" stroke="#3B82F6" stroke-width="0.65" opacity="0.75"/>
  <ellipse cx="16" cy="16" rx="12.5" ry="8.5"  fill="none" stroke="#8B5CF6" stroke-width="0.65" opacity="0.70"/>

  <!-- Sun glow -->
  <circle cx="16" cy="16" r="5" fill="url(#sun-glow)"/>
  <!-- Sun core -->
  <circle cx="16" cy="16" r="2.4" fill="#ffaa55"/>

  <!-- Planet on blue orbit (upper-right) -->
  <circle cx="21.7" cy="12.1" r="1.4" fill="#3B82F6"/>

  <!-- Planet on purple orbit (lower-left) -->
  <circle cx="7.2"  cy="22.0" r="1.1" fill="#8B5CF6"/>

  <!-- Tiny star dots -->
  <circle cx="4"  cy="5"  r="0.4" fill="#ffffff" opacity="0.5"/>
  <circle cx="27" cy="4"  r="0.3" fill="#ffffff" opacity="0.4"/>
  <circle cx="28" cy="25" r="0.4" fill="#ffffff" opacity="0.45"/>
  <circle cx="3"  cy="26" r="0.3" fill="#ffffff" opacity="0.35"/>
  <circle cx="8"  cy="28" r="0.3" fill="#ffffff" opacity="0.3"/>
  <circle cx="25" cy="10" r="0.3" fill="#ffffff" opacity="0.4"/>
</svg>
