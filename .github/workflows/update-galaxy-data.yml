name: Update Galaxy Data

on:
  schedule:
    # Runs every day at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      ai_summarize:
        description: "Enable AI-assisted release summarisation"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build galaxy data
        run: npm run build:data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_SUMMARIZE: "false"

      - name: Commit updated galaxy data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/galaxy-data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update galaxy data $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
